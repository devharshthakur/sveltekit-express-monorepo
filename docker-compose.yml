services:
  api:
    build:
      context: .
      target: api
    environment:
      NODE_ENV: production
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      target: web
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4173
      ORIGIN: http://localhost:4173
    ports:
      - "4173:4173"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
